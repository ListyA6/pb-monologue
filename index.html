<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monologue</title>
<style>
  :root { --bg:#0a0a0a; --fg:#f5f5f5; --muted:#666; --accent:#22d3ee; --line:#1f1f1f; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  body{font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;background:rgba(10,10,10,.92);padding:14px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;backdrop-filter:blur(10px);z-index:10}
  select,header button{font:inherit;background:#161616;color:var(--fg);border:1px solid #2a2a2a;padding:9px 13px;border-radius:8px;cursor:pointer}
  select{flex:1;min-width:0;font-size:15px}
  header button{font-size:14px;color:var(--muted)}
  header button:hover{color:var(--fg)}
  main{max-width:820px;margin:0 auto;padding:48px 28px 220px}
  .title{font-size:22px;font-weight:600;margin:0 0 6px}
  .meta{color:var(--muted);font-size:13px;margin:0 0 56px;letter-spacing:.02em;text-transform:uppercase}
  .beat{margin:0 0 44px;display:grid;grid-template-columns:60px 1fr;gap:24px;align-items:start}
  .t{color:var(--accent);font-family:'JetBrains Mono','SF Mono',monospace;font-size:13px;padding-top:14px;font-weight:500;letter-spacing:.02em}
  .line{font-weight:500;letter-spacing:-.015em;line-height:1.3;color:#fafafa}
  .empty{color:var(--muted);font-style:italic;font-size:17px;text-align:center;margin-top:120px}
  @media (max-width:600px){
    main{padding:32px 18px 180px}
    .beat{grid-template-columns:44px 1fr;gap:14px;margin-bottom:36px}
    .t{font-size:11px;padding-top:10px}
  }
  .sizebar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:#161616;border:1px solid #2a2a2a;border-radius:999px;padding:5px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
  .sizebar button{border:0;background:transparent;color:var(--muted);padding:8px 16px;border-radius:999px;font:inherit;font-size:13px;cursor:pointer;font-weight:600}
  .sizebar button:hover{color:var(--fg)}
  .sizebar button.active{background:var(--accent);color:#000}
</style>
</head>
<body>
<header>
  <select id="picker" aria-label="Choose script"><option>Loading…</option></select>
  <button id="copy" title="Copy monologue">Copy</button>
</header>
<main id="out"><p class="empty">Loading…</p></main>
<div class="sizebar" role="tablist" aria-label="Text size">
  <button data-size="22">S</button>
  <button data-size="30" class="active">M</button>
  <button data-size="40">L</button>
  <button data-size="54">XL</button>
</div>
<script>
const picker = document.getElementById('picker');
const out = document.getElementById('out');
const copyBtn = document.getElementById('copy');
let baseSize = 30;
let currentBeats = [];
let currentMeta = {};

async function loadManifest(){
  try{
    const res = await fetch('manifest.json', {cache:'no-store'});
    const scripts = await res.json();
    if(!scripts.length){ out.innerHTML = '<p class="empty">No scripts yet.</p>'; picker.innerHTML='<option>None</option>'; return; }
    picker.innerHTML = scripts.map(s=>`<option value="${s.file}" data-title="${escAttr(s.title)}" data-date="${s.date||''}" data-length="${s.length||''}">${escAttr(s.title)}</option>`).join('');
    loadScript(picker.options[0]);
  }catch(e){
    out.innerHTML = `<p class="empty">Couldn't load manifest.json — serve this folder over http (GitHub Pages or local server).</p>`;
  }
}
async function loadScript(opt){
  currentMeta = {title: opt.dataset.title, date: opt.dataset.date, length: opt.dataset.length};
  try{
    const res = await fetch(opt.value, {cache:'no-store'});
    const md = await res.text();
    currentBeats = parseScript(md);
    render();
  }catch(e){
    out.innerHTML = `<p class="empty">Couldn't load ${opt.value}</p>`;
  }
}
function parseScript(md){
  const beats = [];
  const lines = md.split('\n');
  let inTable = false;
  for(const raw of lines){
    const line = raw.trim();
    if(!line.startsWith('|')) { inTable = false; continue; }
    const cells = line.split('|').slice(1,-1).map(c=>c.trim());
    if(cells.length < 2) continue;
    // skip header & divider
    if(/^[-:\s]+$/.test(cells[0])) { inTable = true; continue; }
    if(/^t\b/i.test(cells[0]) || /narration/i.test(cells[1])) { inTable = true; continue; }
    if(!inTable) continue;
    let t = cells[0].replace(/s$/,'').trim();
    let narr = cells[1];
    // strip wrapping quotes
    narr = narr.replace(/^["“”]/,'').replace(/["“”]$/,'');
    // strip bold markdown
    narr = narr.replace(/\*\*/g,'');
    // strip wrapping square brackets if whole cell is bracketed placeholder
    if(/^\[[^\]]+\]$/.test(narr)) narr = narr.slice(1,-1);
    narr = narr.trim();
    if(narr) beats.push({t, narration: narr});
  }
  return beats;
}
function render(){
  if(!currentBeats.length){ out.innerHTML='<p class="empty">No spoken lines found in this script.</p>'; return; }
  const totalWords = currentBeats.reduce((n,b)=>n + b.narration.split(/\s+/).length, 0);
  const metaLine = [currentMeta.date, currentMeta.length, `${totalWords} words`].filter(Boolean).join(' · ');
  out.innerHTML = `
    <h1 class="title">${esc(currentMeta.title||'')}</h1>
    <p class="meta">${esc(metaLine)}</p>
    ${currentBeats.map(b=>`
      <div class="beat">
        <div class="t">${esc(b.t)}s</div>
        <div class="line" style="font-size:${baseSize}px">${esc(b.narration)}</div>
      </div>
    `).join('')}
  `;
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escAttr(s){return esc(s)}
picker.addEventListener('change', ()=>loadScript(picker.selectedOptions[0]));
copyBtn.addEventListener('click', async ()=>{
  if(!currentBeats.length) return;
  const text = currentBeats.map(b=>b.narration).join('\n\n');
  try{ await navigator.clipboard.writeText(text); copyBtn.textContent='Copied'; setTimeout(()=>copyBtn.textContent='Copy',1200);}catch(e){}
});
document.querySelectorAll('.sizebar button').forEach(b=>{
  b.addEventListener('click', ()=>{
    baseSize = parseInt(b.dataset.size);
    document.querySelectorAll('.sizebar button').forEach(x=>x.classList.toggle('active', x===b));
    document.querySelectorAll('.line').forEach(l=>l.style.fontSize=baseSize+'px');
  });
});
loadManifest();
</script>
</body>
</html>
